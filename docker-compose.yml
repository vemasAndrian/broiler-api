services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    ports:
      - "8082:4000"
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - backend

  mysql:
    image: mysql:8.4.3
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

networks:
  backend:

volumes:
  mysql_data: